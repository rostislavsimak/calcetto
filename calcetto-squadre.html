<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState, useEffect, useRef } = React;

// ---------- helpers ----------

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

// Goalkeeper aptitude: secondary balancing criterion. Players saved
// before this field existed are treated as "average" on read.
const GK_WEIGHT = { good: 2, average: 1, poor: 0 };

function gkWeight(p) {
  return GK_WEIGHT[p.gkLevel] !== undefined ? GK_WEIGHT[p.gkLevel] : 1;
}

// Generate every distinct way to split `players` into two groups,
// always keeping players[0] in group A (this removes the A/B mirror
// duplicates without any extra bookkeeping).
function allSplits(players) {
  const n = players.length;
  const sizeA = Math.ceil(n / 2);
  const rest = players.slice(1); // everyone except the fixed anchor
  const results = [];

  function recurse(start, chosen) {
    if (chosen.length === sizeA - 1) {
      const groupA = [players[0], ...chosen.map((i) => rest[i])];
      const groupAIds = new Set(groupA.map((p) => p.id));
      const groupB = players.filter((p) => !groupAIds.has(p.id));
      const sumA = groupA.reduce((s, p) => s + p.rating, 0);
      const sumB = groupB.reduce((s, p) => s + p.rating, 0);
      results.push({ groupA, groupB, diff: Math.abs(sumA - sumB), sumA, sumB });
      return;
    }
    for (let i = start; i < rest.length; i++) {
      recurse(i + 1, [...chosen, i]);
    }
  }

  recurse(0, []);
  return results;
}

function bestBalancedSplits(players) {
  const splits = allSplits(players);
  const minDiff = Math.min(...splits.map((s) => s.diff));
  // small tolerance band so there's an actual pool to randomize over,
  // not just one frozen "optimal" answer every time
  let pool = splits.filter((s) => s.diff <= minDiff);
  if (pool.length < 4) {
    pool = splits.filter((s) => s.diff <= minDiff + 1);
  }

  // Secondary criterion: goalkeeper aptitude. Applied only inside the
  // rating-balanced pool, with the same widening pattern, so it never
  // overrides rating balance nor kills draw variety.
  const withGk = pool.map((s) => ({
    ...s,
    gkDiff: Math.abs(
      s.groupA.reduce((t, p) => t + gkWeight(p), 0) -
        s.groupB.reduce((t, p) => t + gkWeight(p), 0)
    ),
  }));
  const gkLevels = [...new Set(withGk.map((s) => s.gkDiff))].sort(
    (a, b) => a - b
  );
  let gkPool = withGk;
  for (const lvl of gkLevels) {
    const candidate = withGk.filter((s) => s.gkDiff <= lvl);
    if (candidate.length >= 4 || lvl === gkLevels[gkLevels.length - 1]) {
      gkPool = candidate;
      break;
    }
  }

  return { pool: gkPool, minDiff };
}

const STORAGE_KEY = "calcetto-roster";
const HISTORY_KEY = "calcetto-history";
const HISTORY_MAX = 30;

// ---------- post-match vote link (base64url + compact vote code) ----------
// Vote payload lives entirely in the URL (?vote=...), no backend: the
// organizer shares a link, each player votes on their own phone, then
// sends the resulting code back over WhatsApp for the organizer to paste
// into "Conta voti". Code format: CLC1|<matchId>|<voterId>|<id>:<d>,...
// where d is -1/0/1 for -0.5/invariato/+0.5.
function toB64Url(str) {
  return btoa(unescape(encodeURIComponent(str)))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");
}

function fromB64Url(str) {
  let s = str.replace(/-/g, "+").replace(/_/g, "/");
  while (s.length % 4) s += "=";
  return decodeURIComponent(escape(atob(s)));
}

function buildVoteLink(matchId, date, players) {
  const payload = {
    m: matchId,
    d: date,
    p: players.map((p) => ({ i: p.id, n: p.name })),
  };
  const encoded = toB64Url(JSON.stringify(payload));
  const base = location.href.split("?")[0].split("#")[0];
  return base + "?vote=" + encoded;
}

function buildVoteCode(matchId, voterId, deltas, players) {
  const pairs = players
    .filter((p) => p.i !== voterId)
    .map((p) => p.i + ":" + (deltas[p.i] || 0))
    .join(",");
  return "CLC1|" + matchId + "|" + voterId + "|" + pairs;
}

// Extracts every vote code for `matchId` found anywhere in pasted text
// (WhatsApp forwards add names/timestamps around it, so this scans loosely
// rather than expecting the whole paste to be just the code).
function parseVoteCodes(text, matchId) {
  const re = /CLC1\|([a-z0-9]+)\|([a-z0-9]+)\|([a-z0-9:,\-]+)/gi;
  const byVoter = new Map(); // last vote per voterId wins
  let m;
  while ((m = re.exec(text))) {
    const [, mId, voterId, pairsRaw] = m;
    if (mId !== matchId) continue;
    const deltas = {};
    pairsRaw.split(",").forEach((pair) => {
      const [id, d] = pair.split(":");
      if (id) deltas[id] = Number(d) || 0;
    });
    byVoter.set(voterId, deltas);
  }
  return [...byVoter.entries()].map(([voterId, deltas]) => ({
    voterId,
    deltas,
  }));
}

function tallyVotes(votes, players) {
  const sum = {};
  const count = {};
  players.forEach((p) => {
    sum[p.id] = 0;
    count[p.id] = 0;
  });
  votes.forEach((v) => {
    Object.entries(v.deltas).forEach(([id, d]) => {
      if (!(id in sum)) return;
      sum[id] += d;
      count[id] += 1;
    });
  });
  return players.map((p) => {
    const n = count[p.id];
    const avgDelta = n > 0 ? sum[p.id] / n : 0;
    return { ...p, votes: n, avgDelta };
  });
}

const GK_OPTIONS = [
  { value: "good", label: "Sì" },
  { value: "average", label: "Normale" },
  { value: "poor", label: "No" },
];

// Parse a typed rating ("7,5" or "7.5"), clamp to 1–10, snap to half points.
// Falls back to `fallback` when the input isn't a number.
function clampRating(raw, fallback) {
  const v = parseFloat(String(raw).replace(",", "."));
  if (isNaN(v)) return fallback;
  return Math.min(10, Math.max(1, Math.round(v * 2) / 2));
}

function buildShareText(result) {
  return (
    "Calcetto\n" +
    "Rossa: " +
    result.groupA.map((p) => p.name).join(", ") +
    "\n" +
    "Blu: " +
    result.groupB.map((p) => p.name).join(", ")
  );
}

// ---------- formation share card (canvas) ----------

// Canvas can't read CSS custom properties: palette hardcoded, same hex
// values as the app skin.
const CARD_W = 1080;
const CARD_H = 1350;
const CARD_C = {
  bgTop: "#0A1F12",
  bgBottom: "#05130B",
  grassA: "#1B4332",
  grassB: "#16382A",
  line: "rgba(255,255,255,0.5)",
  gold: "#F2B705",
  red: "#E4485A",
  blue: "#3D8BD4",
  cream: "#F5F1E8",
};

// Rows for one team, based only on head count — never on who the players are.
function layoutRows(n) {
  if (n <= 0) return [];
  const rows = Math.ceil(Math.sqrt(n));
  const base = Math.floor(n / rows);
  const extra = n % rows;
  return Array.from({ length: rows }, (_, i) => base + (i < extra ? 1 : 0));
}

function formatCardDate(d) {
  const s = d.toLocaleDateString("it-IT", {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric",
  });
  return s.replace(/(^|\s)(\S)/g, (m, sp, ch) => sp + ch.toUpperCase());
}

function fitText(ctx, text, maxWidth) {
  if (ctx.measureText(text).width <= maxWidth) return text;
  let t = text;
  while (t.length > 1 && ctx.measureText(t + "…").width > maxWidth) {
    t = t.slice(0, -1);
  }
  return t + "…";
}

function drawTeamOnCard(ctx, group, color, area, mirrored) {
  const rows = layoutRows(group.length);
  const dotR = 34;
  let idx = 0;
  rows.forEach((count, r) => {
    const frac = (r + 1) / (rows.length + 1);
    const y = mirrored
      ? area.y + area.h - area.h * frac
      : area.y + area.h * frac;
    for (let i = 0; i < count; i++) {
      const p = group[idx++];
      const x = area.x + (area.w * (i + 1)) / (count + 1);
      // subtle goalkeeper hint (aesthetics only, not a field position)
      if (p.gkLevel === "good") {
        ctx.beginPath();
        ctx.arc(x, y, dotR + 7, 0, Math.PI * 2);
        ctx.strokeStyle = CARD_C.gold;
        ctx.lineWidth = 4;
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.7)";
      ctx.lineWidth = 3;
      ctx.stroke();
      // no numbers on the shared image: names only
      const maxW = Math.min(area.w / (count + 1) - 16, 240);
      ctx.textAlign = "center";
      ctx.font = "700 32px 'Barlow Condensed', sans-serif";
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.85)";
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 2;
      ctx.fillStyle = CARD_C.cream;
      ctx.textBaseline = "alphabetic";
      ctx.fillText(fitText(ctx, p.name, maxW), x, y + dotR + 38);
      ctx.restore();
    }
  });
}

function drawFormationCard(canvas, result) {
  canvas.width = CARD_W;
  canvas.height = CARD_H;
  const ctx = canvas.getContext("2d");
  const W = CARD_W;
  const H = CARD_H;

  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, CARD_C.bgTop);
  bg.addColorStop(1, CARD_C.bgBottom);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const headerH = 150;
  const footerH = 70;
  const margin = 60;
  const px = margin;
  const py = headerH;
  const pw = W - margin * 2;
  const ph = H - headerH - footerH;
  const midY = py + ph / 2;

  // striped grass
  const stripes = 10;
  for (let i = 0; i < stripes; i++) {
    ctx.fillStyle = i % 2 === 0 ? CARD_C.grassA : CARD_C.grassB;
    ctx.fillRect(px, py + (ph / stripes) * i, pw, ph / stripes + 1);
  }

  // floodlight vignette
  const vg = ctx.createRadialGradient(
    W / 2,
    midY,
    ph * 0.2,
    W / 2,
    midY,
    ph * 0.8
  );
  vg.addColorStop(0, "rgba(0,0,0,0)");
  vg.addColorStop(1, "rgba(0,0,0,0.35)");
  ctx.fillStyle = vg;
  ctx.fillRect(px, py, pw, ph);

  // pitch lines
  ctx.strokeStyle = CARD_C.line;
  ctx.lineWidth = 4;
  ctx.strokeRect(px, py, pw, ph);
  ctx.beginPath();
  ctx.moveTo(px, midY);
  ctx.lineTo(px + pw, midY);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(W / 2, midY, 110, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(W / 2, midY, 6, 0, Math.PI * 2);
  ctx.fillStyle = CARD_C.line;
  ctx.fill();

  // penalty + goal boxes at both ends
  const boxW = pw * 0.44;
  const boxH = 120;
  const goalW = pw * 0.2;
  const goalH = 46;
  ctx.strokeRect(W / 2 - boxW / 2, py, boxW, boxH);
  ctx.strokeRect(W / 2 - goalW / 2, py, goalW, goalH);
  ctx.strokeRect(W / 2 - boxW / 2, py + ph - boxH, boxW, boxH);
  ctx.strokeRect(W / 2 - goalW / 2, py + ph - goalH, goalW, goalH);

  // header
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  ctx.fillStyle = CARD_C.gold;
  ctx.font = "900 58px 'Barlow Condensed', sans-serif";
  ctx.fillText("CALCETTO", W / 2, 72);
  ctx.fillStyle = "rgba(245,241,232,0.85)";
  ctx.font = "600 34px Barlow, sans-serif";
  ctx.fillText(formatCardDate(new Date()), W / 2, 120);

  // teams: red top half, blue bottom half mirrored
  drawTeamOnCard(
    ctx,
    result.groupA,
    CARD_C.red,
    { x: px, y: py, w: pw, h: ph / 2 },
    false
  );
  drawTeamOnCard(
    ctx,
    result.groupB,
    CARD_C.blue,
    { x: px, y: midY, w: pw, h: ph / 2 },
    true
  );

  // team labels — no numbers anywhere on the shared image
  ctx.font = "700 36px 'Barlow Condensed', sans-serif";
  ctx.textAlign = "left";
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.7)";
  ctx.shadowBlur = 6;
  ctx.fillStyle = CARD_C.red;
  ctx.fillText("SQUADRA ROSSA", px + 24, py + 52);
  ctx.fillStyle = CARD_C.blue;
  ctx.fillText("SQUADRA BLU", px + 24, py + ph - 28);
  ctx.restore();
}

// ---------- main component ----------

function App() {
  const [players, setPlayers] = useState([]);
  const [history, setHistory] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [newName, setNewName] = useState("");
  const [newRating, setNewRating] = useState(3);
  const [newGk, setNewGk] = useState("average");
  const [presentIds, setPresentIds] = useState(new Set());
  const [result, setResult] = useState(null); // { groupA, groupB, diff }
  const [pool, setPool] = useState([]);
  const [spinning, setSpinning] = useState(false);
  const [view, setView] = useState("match"); // "match" | "roster" | "history"
  const spinRef = useRef(null);

  // load
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        setPlayers(
          JSON.parse(raw).map((p) => ({
            ...p,
            gkLevel: p.gkLevel || "average",
          }))
        );
      }
    } catch (e) {
      // no saved roster yet
    }
    try {
      const h = localStorage.getItem(HISTORY_KEY);
      if (h) setHistory(JSON.parse(h));
    } catch (e) {
      // no saved history yet
    }
    setLoaded(true);
  }, []);

  // persist (guests are one-night only: never written to storage)
  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(players.filter((p) => !p.isGuest))
      );
    } catch (e) {}
  }, [players, loaded]);

  function addPlayer() {
    const name = newName.trim();
    if (!name) return;
    setPlayers((p) => [
      ...p,
      { id: uid(), name, rating: Number(newRating), gkLevel: newGk },
    ]);
    setNewName("");
    setNewRating(3);
    setNewGk("average");
  }

  function addGuest(name, rating, gkLevel) {
    const id = uid();
    setPlayers((p) => [...p, { id, name, rating, gkLevel, isGuest: true }]);
    setPresentIds((s) => new Set(s).add(id));
    setResult(null);
  }

  function removePlayer(id) {
    setPlayers((p) => p.filter((pl) => pl.id !== id));
    setPresentIds((s) => {
      const next = new Set(s);
      next.delete(id);
      return next;
    });
  }

  function updateRating(id, rating) {
    setPlayers((p) => p.map((pl) => (pl.id === id ? { ...pl, rating } : pl)));
  }

  function updateGk(id, gkLevel) {
    setPlayers((p) => p.map((pl) => (pl.id === id ? { ...pl, gkLevel } : pl)));
  }

  function togglePresent(id) {
    setPresentIds((s) => {
      const next = new Set(s);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
    setResult(null);
  }

  function presentPlayers() {
    return players.filter((p) => presentIds.has(p.id));
  }

  function runDraw(excludeLast) {
    const present = presentPlayers();
    if (present.length < 2) return;
    const { pool: candidates } = bestBalancedSplits(present);
    setPool(candidates);

    let choices = candidates;
    if (excludeLast && result && candidates.length > 1) {
      const lastIds = result.groupA.map((p) => p.id).sort().join(",");
      const filtered = candidates.filter(
        (c) => c.groupA.map((p) => p.id).sort().join(",") !== lastIds
      );
      if (filtered.length > 0) choices = filtered;
    }

    const final = choices[Math.floor(Math.random() * choices.length)];

    // scoreboard-flicker animation: cycle through random candidates
    // a few times before landing on the real pick
    setSpinning(true);
    let ticks = 0;
    const maxTicks = 10;
    clearInterval(spinRef.current);
    spinRef.current = setInterval(() => {
      ticks++;
      if (ticks >= maxTicks) {
        clearInterval(spinRef.current);
        setResult(final);
        setSpinning(false);
        return;
      }
      const flicker = candidates[Math.floor(Math.random() * candidates.length)];
      setResult(flicker);
    }, 90);
  }

  // Manual correction: swap one player from group A with one from group B.
  // Touches only the local result — pool and history stay as they are.
  function swapInResult(idA, idB) {
    if (!result) return;
    const pA = result.groupA.find((p) => p.id === idA);
    const pB = result.groupB.find((p) => p.id === idB);
    if (!pA || !pB) return;
    const groupA = result.groupA.map((p) => (p.id === idA ? pB : p));
    const groupB = result.groupB.map((p) => (p.id === idB ? pA : p));
    const sumA = groupA.reduce((s, p) => s + p.rating, 0);
    const sumB = groupB.reduce((s, p) => s + p.rating, 0);
    setResult({ groupA, groupB, sumA, sumB, diff: Math.abs(sumA - sumB) });
  }

  function saveFormation() {
    if (!result) return;
    const record = {
      matchId: uid(),
      date: new Date().toISOString(),
      groupA: result.groupA.map((p) => ({ id: p.id, name: p.name })),
      groupB: result.groupB.map((p) => ({ id: p.id, name: p.name })),
      sumA: result.sumA,
      sumB: result.sumB,
    };
    const next = [record, ...history].slice(0, HISTORY_MAX);
    setHistory(next);
    try {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(next));
    } catch (e) {}
  }

  function deleteHistoryRecord(index) {
    const next = history.filter((_, i) => i !== index);
    setHistory(next);
    try {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(next));
    } catch (e) {}
  }

  const present = presentPlayers();
  const canDraw = present.length >= 2;

  return (
    <div
      className="min-h-screen w-full relative"
      style={{
        background: "linear-gradient(180deg, #0A1F12 0%, #05130B 100%)",
        color: "#F5F1E8",
      }}
    >
      <div className="pitch-lines" aria-hidden="true"></div>
      <div className="floodlight" aria-hidden="true"></div>
      <div className="noise" aria-hidden="true"></div>

      <div className="max-w-md mx-auto px-4 pb-16 pt-7 relative">
        {/* header */}
        <header className="mb-6">
          <div
            className="flex items-center gap-2 text-xs font-semibold tracking-[0.3em] mb-1.5"
            style={{ color: "#F2B705" }}
          >
            <span
              className="kicker-dot inline-block w-2 h-2 rounded-full"
              style={{ background: "#F2B705" }}
            ></span>
            CALCETTO
          </div>
          <h1
            className="font-display font-black uppercase leading-none"
            style={{ fontSize: "3.4rem", letterSpacing: "0.01em" }}
          >
            Squadre
          </h1>
        </header>

        {/* tabs */}
        <div
          className="flex gap-1 p-1 rounded-xl mb-6"
          style={{
            background: "rgba(255,255,255,0.06)",
            border: "1px solid rgba(255,255,255,0.06)",
          }}
        >
          {[
            { id: "match", label: "Oggi" },
            { id: "roster", label: "Rosa" },
            { id: "history", label: "Storico" },
          ].map((t) => (
            <button
              key={t.id}
              onClick={() => setView(t.id)}
              className="pressable font-display flex-1 py-2.5 rounded-lg text-base font-bold uppercase tracking-wider"
              style={{
                background: view === t.id ? "#1B4332" : "transparent",
                color: view === t.id ? "#F5F1E8" : "rgba(245,241,232,0.5)",
                boxShadow:
                  view === t.id
                    ? "0 2px 14px rgba(242,183,5,0.18), inset 0 -2px 0 #F2B705"
                    : "none",
              }}
            >
              {t.label}
            </button>
          ))}
        </div>

        {view === "roster" && (
          <RosterView
            players={players}
            history={history}
            newName={newName}
            setNewName={setNewName}
            newRating={newRating}
            setNewRating={setNewRating}
            newGk={newGk}
            setNewGk={setNewGk}
            addPlayer={addPlayer}
            removePlayer={removePlayer}
            updateRating={updateRating}
            updateGk={updateGk}
          />
        )}

        {view === "match" && (
          <MatchView
            players={players}
            presentIds={presentIds}
            togglePresent={togglePresent}
            present={present}
            canDraw={canDraw}
            runDraw={runDraw}
            spinning={spinning}
            result={result}
            poolSize={pool.length}
            goToRoster={() => setView("roster")}
            onSwap={swapInResult}
            saveFormation={saveFormation}
            addGuest={addGuest}
          />
        )}

        {view === "history" && (
          <HistoryView
            history={history}
            onDelete={deleteHistoryRecord}
            players={players}
          />
        )}
      </div>
    </div>
  );
}

// ---------- match day tab ----------

function MatchView({
  players,
  presentIds,
  togglePresent,
  present,
  canDraw,
  runDraw,
  spinning,
  result,
  poolSize,
  goToRoster,
  onSwap,
  saveFormation,
  addGuest,
}) {
  const [query, setQuery] = useState("");
  const [selectedChip, setSelectedChip] = useState(null); // { id, team }
  const [showGuestForm, setShowGuestForm] = useState(false);
  const [guestName, setGuestName] = useState("");
  const [guestRating, setGuestRating] = useState(3);
  const [guestGk, setGuestGk] = useState("average");
  const [copied, setCopied] = useState(false);
  const [savedFlash, setSavedFlash] = useState(false);
  const [shareCard, setShareCard] = useState(null); // dataURL of the preview
  const shareCanvasRef = useRef(null);

  const resultKey = result
    ? result.groupA.map((p) => p.id).sort().join(",")
    : "none";

  useEffect(() => {
    setSelectedChip(null);
  }, [resultKey]);

  if (players.length === 0) {
    return (
      <div className="text-sm opacity-60 py-10 text-center">
        Prima crea la rosa.
        <br />
        <button
          onClick={goToRoster}
          className="pressable mt-3 underline font-bold"
          style={{ color: "#F2B705" }}
        >
          Vai alla Rosa →
        </button>
      </div>
    );
  }

  const q = query.trim().toLowerCase();
  const sorted = players.slice().sort((a, b) => a.name.localeCompare(b.name));
  const filtered = q
    ? sorted.filter((p) => p.name.toLowerCase().includes(q))
    : sorted;

  function onChipClick(playerId, team) {
    if (spinning) return;
    if (!selectedChip) {
      setSelectedChip({ id: playerId, team });
      return;
    }
    if (selectedChip.id === playerId) {
      setSelectedChip(null);
      return;
    }
    if (selectedChip.team === team) {
      setSelectedChip({ id: playerId, team });
      return;
    }
    const aId = team === "B" ? selectedChip.id : playerId;
    const bId = team === "B" ? playerId : selectedChip.id;
    onSwap(aId, bId);
    setSelectedChip(null);
  }

  function submitGuest() {
    const name = guestName.trim();
    if (!name) return;
    addGuest(name, clampRating(guestRating, 3), guestGk);
    setGuestName("");
    setGuestRating(3);
    setGuestGk("average");
    setShowGuestForm(false);
  }

  async function openShareCard() {
    if (!result) return;
    // the canvas won't wait for webfonts on its own
    try {
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
    } catch (e) {}
    const canvas = document.createElement("canvas");
    drawFormationCard(canvas, result);
    shareCanvasRef.current = canvas;
    try {
      setShareCard(canvas.toDataURL("image/png"));
    } catch (e) {
      setShareCard(null);
    }
  }

  async function shareCardImage() {
    const canvas = shareCanvasRef.current;
    if (!canvas) return;
    const text = buildShareText(result);
    let blob = null;
    try {
      blob = await new Promise((res) => canvas.toBlob(res, "image/png"));
    } catch (e) {}
    if (blob && typeof File !== "undefined" && navigator.canShare) {
      const file = new File([blob], "calcetto-squadre.png", {
        type: "image/png",
      });
      if (navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: "Calcetto",
            text,
          });
          return;
        } catch (e) {
          if (e.name === "AbortError") return;
        }
      }
    }
    // fallback: download the PNG; if even that fails (sandboxed host),
    // the preview stays on screen for a manual screenshot
    try {
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = "calcetto-squadre.png";
      document.body.appendChild(a);
      a.click();
      a.remove();
    } catch (e) {}
  }

  async function copyShareText() {
    try {
      await navigator.clipboard.writeText(buildShareText(result));
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (e) {
      // clipboard unavailable: fail silently
    }
  }

  function handleSave() {
    saveFormation();
    setSavedFlash(true);
    setTimeout(() => setSavedFlash(false), 2000);
  }

  return (
    <div>
      <div className="font-display text-sm font-bold uppercase tracking-widest mb-2 opacity-70">
        Chi c'è oggi ({present.length})
      </div>

      <div className="relative mb-3">
        <input
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === "Enter" && filtered.length > 0) {
              togglePresent(filtered[0].id);
              setQuery("");
            }
            if (e.key === "Escape") setQuery("");
          }}
          placeholder="Cerca giocatore… (Invio aggiunge il primo)"
          className="w-full px-3 py-2.5 rounded-lg text-sm"
          style={{
            background: "rgba(5,19,11,0.6)",
            border: "1px solid rgba(255,255,255,0.15)",
            color: "#F5F1E8",
            minHeight: "44px",
          }}
        />
        {query && (
          <button
            onClick={() => setQuery("")}
            aria-label="Cancella ricerca"
            className="pressable absolute right-2 top-1/2 -translate-y-1/2 flex items-center justify-center rounded-md"
            style={{
              width: "28px",
              height: "28px",
              color: "rgba(245,241,232,0.6)",
              background: "rgba(255,255,255,0.08)",
            }}
          >
            <XIcon />
          </button>
        )}
      </div>

      {filtered.length === 0 && (
        <div className="text-sm opacity-50 py-4 text-center mb-3">
          Nessun giocatore corrisponde a "{query}".
        </div>
      )}

      <div className="grid grid-cols-2 gap-2 mb-3">
        {filtered.map((p) => {
          const active = presentIds.has(p.id);
          return (
            <button
              key={p.id}
              onClick={() => togglePresent(p.id)}
              className="pressable flex items-center justify-between px-3 rounded-xl text-sm font-semibold"
              style={{
                minHeight: "48px",
                background: active ? "#1B4332" : "rgba(255,255,255,0.04)",
                border: active
                  ? "1px solid #F2B705"
                  : "1px solid rgba(255,255,255,0.08)",
                boxShadow: active ? "0 0 14px rgba(242,183,5,0.22)" : "none",
              }}
            >
              <span>{p.name}</span>
              <span
                className="tabular min-w-6 h-6 px-1 flex items-center justify-center rounded-full text-[11px] font-black"
                style={{
                  background: active ? "#F2B705" : "rgba(255,255,255,0.12)",
                  color: active ? "#0A1F12" : "rgba(245,241,232,0.6)",
                }}
              >
                {p.rating}
              </span>
            </button>
          );
        })}
      </div>

      {/* one-night guest */}
      <div className="mb-6">
        {!showGuestForm && (
          <button
            onClick={() => setShowGuestForm(true)}
            className="pressable font-display w-full py-2.5 rounded-lg font-bold uppercase tracking-wider text-sm opacity-80"
            style={{
              background: "rgba(255,255,255,0.05)",
              color: "#F5F1E8",
              border: "1px dashed rgba(255,255,255,0.25)",
            }}
          >
            + Ospite di stasera
          </button>
        )}
        {showGuestForm && (
          <div
            className="rounded-2xl p-4"
            style={{
              background: "rgba(255,255,255,0.05)",
              border: "1px dashed rgba(255,255,255,0.25)",
              backdropFilter: "blur(8px)",
            }}
          >
            <div className="font-display text-sm font-bold uppercase tracking-widest mb-3 opacity-70">
              Ospite di stasera (non resta in rosa)
            </div>
            <input
              value={guestName}
              onChange={(e) => setGuestName(e.target.value)}
              placeholder="Nome ospite"
              className="w-full mb-3 px-3 py-2.5 rounded-lg text-sm"
              style={{
                background: "rgba(5,19,11,0.6)",
                border: "1px solid rgba(255,255,255,0.15)",
                color: "#F5F1E8",
              }}
            />
            <div className="flex items-center gap-3 mb-3">
              <span className="font-display text-xs opacity-70 font-bold uppercase tracking-wider">
                Livello
              </span>
              <input
                type="range"
                min="1"
                max="10"
                step="0.5"
                value={guestRating}
                onChange={(e) => setGuestRating(e.target.value)}
                className="flex-1"
                style={{ minHeight: "44px" }}
              />
              <input
                type="number"
                inputMode="decimal"
                min="1"
                max="10"
                step="0.5"
                key={"guest-" + guestRating}
                defaultValue={guestRating}
                aria-label="Livello ospite (scrivi il punteggio)"
                onBlur={(e) =>
                  setGuestRating(clampRating(e.target.value, Number(guestRating)))
                }
                onKeyDown={(e) => {
                  if (e.key === "Enter") e.target.blur();
                }}
                className="rating-input tabular w-12 h-8 rounded-full text-sm font-black text-center"
                style={{
                  background: "#F2B705",
                  color: "#0A1F12",
                  border: "none",
                }}
              />
            </div>
            <div className="flex items-center gap-3 mb-4">
              <span className="font-display text-xs opacity-70 font-bold uppercase tracking-wider">
                È bravo in porta?
              </span>
              <GkPicker value={guestGk} onChange={setGuestGk} />
            </div>
            <div className="flex gap-2">
              <button
                onClick={submitGuest}
                className="pressable font-display flex-1 py-2.5 rounded-lg font-bold uppercase text-sm tracking-wider"
                style={{
                  background: "#1B4332",
                  color: "#F5F1E8",
                  border: "1px solid rgba(255,255,255,0.1)",
                }}
              >
                Aggiungi ospite
              </button>
              <button
                onClick={() => setShowGuestForm(false)}
                className="pressable font-display px-4 py-2.5 rounded-lg font-bold uppercase text-sm tracking-wider opacity-60"
                style={{
                  background: "rgba(255,255,255,0.08)",
                  color: "#F5F1E8",
                }}
              >
                Annulla
              </button>
            </div>
          </div>
        )}
      </div>

      <button
        disabled={!canDraw}
        onClick={() => runDraw(false)}
        className="pressable font-display w-full py-4 rounded-xl font-black uppercase tracking-wider text-lg mb-2"
        style={{
          background: canDraw ? "#F2B705" : "rgba(255,255,255,0.08)",
          color: canDraw ? "#0A1F12" : "rgba(245,241,232,0.4)",
          boxShadow: canDraw ? "0 4px 24px rgba(242,183,5,0.35)" : "none",
          cursor: canDraw ? "pointer" : "not-allowed",
        }}
      >
        {result ? "Gira di nuovo da zero" : "Forma le squadre"}
      </button>

      {!canDraw && (
        <div className="text-xs opacity-50 text-center mb-4">
          Seleziona almeno 2 giocatori presenti.
        </div>
      )}

      {result && (
        <>
          <button
            onClick={() => runDraw(true)}
            disabled={spinning || poolSize <= 1}

function TeamCard({
  label,
  color,
  group,
  spinning,
  delay,
  teamKey,
  onChipClick,
  selectedId,
}) {
  const sum = group.reduce((s, p) => s + p.rating, 0);
  const avg = (sum / group.length).toFixed(1);
  return (
    <div
      className={"rounded-2xl p-4 " + (spinning ? "spin-blur" : "card-enter")}
      style={{
        background: "rgba(255,255,255,0.05)",
        border: "1px solid rgba(255,255,255,0.08)",
        borderLeft: "4px solid " + color,
        backdropFilter: "blur(8px)",
        boxShadow: "-2px 0 18px " + color + "33",
        animationDelay: spinning ? "0ms" : delay + "ms",
      }}
    >
      <div className="flex items-baseline justify-between mb-2.5">
        <span
          className="font-display text-lg font-black uppercase tracking-wide"
          style={{ color }}
        >
          {label}
        </span>
        <span className="font-display tabular text-base font-bold opacity-60">
          media {avg}
        </span>
      </div>
      <div className="flex flex-wrap gap-1.5">
        {group.map((p) => {
          const selected = selectedId === p.id;
          return (
            <button
              key={p.id}
              onClick={() => onChipClick(p.id, teamKey)}
              className="pressable px-2.5 py-1.5 rounded-full text-xs font-semibold"
              style={{
                background: selected ? "#F2B705" : "rgba(255,255,255,0.08)",
                color: selected ? "#0A1F12" : "#F5F1E8",
                border: selected
                  ? "1px solid #F2B705"
                  : "1px solid rgba(255,255,255,0.08)",
                boxShadow: selected
                  ? "0 0 12px rgba(242,183,5,0.4)"
                  : "none",
              }}
            >
              {p.name}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function HistoryView({ history, onDelete, players }) {
  const [confirmIdx, setConfirmIdx] = useState(null);
  const [linkIdx, setLinkIdx] = useState(null);
  const [tallyIdx, setTallyIdx] = useState(null);

  if (history.length === 0) {
    return (
      <div className="text-sm opacity-60 py-10 text-center">
        Nessuna partita salvata.
        <br />
        Sorteggia e premi "Salva formazione".
      </div>
    );
  }

  // two-tap delete: first tap arms the confirmation, second deletes;
  // auto-disarms after 3s
  function handleDelete(i) {
    if (confirmIdx === i) {
      onDelete(i);
      setConfirmIdx(null);
    } else {
      setConfirmIdx(i);
      setTimeout(() => {
        setConfirmIdx((c) => (c === i ? null : c));
      }, 3000);
    }
  }

  return (
    <div className="space-y-2">
      {history.map((h, i) => (
        <div
          key={h.date + "-" + i}
          className="rounded-2xl p-4"
          style={{

        >
          <div className="flex items-center justify-between mb-2">
            <span className="font-display text-sm font-bold uppercase tracking-widest opacity-70">
              {new Date(h.date).toLocaleDateString("it-IT", {
                weekday: "short",
                day: "2-digit",
                month: "2-digit",
                year: "numeric",
              })}
            </span>
            <div className="flex items-center gap-2">
              <span className="tabular text-xs opacity-50 font-bold">
                {h.sumA} – {h.sumB}
              </span>
              <button
                onClick={() => handleDelete(i)}
                aria-label={
                  confirmIdx === i
                    ? "Conferma eliminazione partita"
                    : "Elimina partita"
                }
                className="pressable font-display flex items-center justify-center rounded-md text-[11px] font-bold uppercase tracking-wide"
                style={{
                  minWidth: "28px",
                  height: "28px",
                  padding: confirmIdx === i ? "0 10px" : "0",
                  background:
                    confirmIdx === i ? "#E4485A" : "rgba(228,72,90,0.18)",
                  color: confirmIdx === i ? "#F5F1E8" : "#E4485A",
                  border: "1px solid rgba(228,72,90,0.25)",

              >

            </div>
          </div>
          <div className="text-xs">
            <span style={{ color: "#E4485A", fontWeight: 700 }}>Rossa:</span>{" "}
            {h.groupA.map((p) => p.name).join(", ")}

          <div className="text-xs mt-1">

          {h.matchId && (
            <div className="grid grid-cols-2 gap-2 mt-3">
              <button
                onClick={() => setLinkIdx(i)}

                  background: "rgba(255,255,255,0.07)",

                  border: "1px solid rgba(255,255,255,0.1)",
                }}
              >
                Genera link voto
              </button>
              <button
                onClick={() => setTallyIdx(i)}
                className="pressable font-display py-2 rounded-lg font-bold uppercase tracking-wider text-xs"

function VoteLinkModal({ record, onClose }) {
  const [copied, setCopied] = useState(false);
  const matchPlayers = [...record.groupA, ...record.groupB];
  const link = buildVoteLink(record.matchId, record.date, matchPlayers);

  async function copyLink() {
    try {
      await navigator.clipboard.writeText(link);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (e) {}
  }

  async function share() {
    try {
      if (navigator.share) {
        await navigator.share({
          title: "Calcetto — vota i compagni",
          text: "Vota i compagni della partita:",
          url: link,
        });
        return;
      }
    } catch (e) {
      if (e.name === "AbortError") return;
    }
    copyLink();
  }

  return (
    <ModalShell onClose={onClose}>
      <div className="font-display text-sm font-bold uppercase tracking-widest mb-3 opacity-70">
        Link voto compagni
      </div>
      <div className="text-xs opacity-60 mb-3">
        Manda questo link ai giocatori della partita. Ognuno vota dal proprio
        telefono e ti rimanda il codice generato (es. su WhatsApp).
      </div>
      <input
        readOnly
        value={link}
        onFocus={(e) => e.target.select()}
        className="w-full mb-3 px-3 py-2.5 rounded-lg text-xs"
        style={{
          background: "rgba(5,19,11,0.6)",
          border: "1px solid rgba(255,255,255,0.15)",
          color: "#F5F1E8",
        }}
      />
      <div className="flex gap-2">
        <button
          onClick={share}
          className="pressable font-display flex-1 py-2.5 rounded-lg font-bold uppercase tracking-wider text-sm"
          style={{ background: "#F2B705", color: "#0A1F12" }}
        >
          Condividi
        </button>
        <button
          onClick={copyLink}
          className="pressable font-display flex-1 py-2.5 rounded-lg font-bold uppercase tracking-wider text-sm"
          style={{
            background: "rgba(255,255,255,0.08)",
            color: "#F5F1E8",
            border: "1px solid rgba(255,255,255,0.1)",
          }}
        >
          {copied ? "Copiato ✓" : "Copia link"}
        </button>
      </div>
    </ModalShell>
  );
}

function TallyModal({ record, players, onClose }) {
  const [pasted, setPasted] = useState("");
  const [rows, setRows] = useState(null);

  const matchPlayers = [...record.groupA, ...record.groupB];

  function compute() {
    const votes = parseVoteCodes(pasted, record.matchId);
    const tallied = tallyVotes(votes, matchPlayers);
    const withRatings = tallied.map((t) => {
      const current = players.find((p) => p.id === t.id);
      const currentRating = current ? current.rating : null;
      const suggested =
        currentRating != null
          ? clampRating(currentRating + t.avgDelta * 0.5, currentRating)
          : null;
      return { ...t, currentRating, suggested };
    });
    setRows({ withRatings, voterCount: votes.length });
  }

  return (
    <ModalShell onClose={onClose}>
      <div className="font-display text-sm font-bold uppercase tracking-widest mb-3 opacity-70">
        Conta voti
      </div>
      <div className="text-xs opacity-60 mb-3">
        Incolla qui i messaggi ricevuti (anche tutti insieme, va bene se
        contengono altro testo attorno).
      </div>
      <textarea
        value={pasted}
        onChange={(e) => setPasted(e.target.value)}
        placeholder="Incolla i voti ricevuti…"
        rows={5}
        className="w-full mb-3 px-3 py-2.5 rounded-lg text-xs"
        style={{
          background: "rgba(5,19,11,0.6)",
          border: "1px solid rgba(255,255,255,0.15)",
          color: "#F5F1E8",
        }}
      />
      <button
        onClick={compute}
        className="pressable font-display w-full py-2.5 rounded-lg font-bold uppercase tracking-wider text-sm mb-3"
        style={{ background: "#F2B705", color: "#0A1F12" }}
      >
        Calcola
      </button>

      {rows && (
        <div>
          <div className="text-xs opacity-50 mb-2">
            {rows.voterCount} vot{rows.voterCount === 1 ? "o" : "i"} letti.
          </div>
          <div className="space-y-1.5 mb-2">
            {rows.withRatings.map((r) => (
              <div
                key={r.id}
                className="flex items-center justify-between text-xs px-2.5 py-2 rounded-lg"
                style={{ background: "rgba(255,255,255,0.05)" }}
              >
                <span className="font-semibold">{r.name}</span>
                <span className="tabular opacity-60">
                  {r.votes} vot{r.votes === 1 ? "o" : "i"}
                </span>
                <span className="tabular">
                  {r.currentRating != null ? r.currentRating : "–"}
                  {" → "}
                  <span style={{ color: "#F2B705", fontWeight: 700 }}>
                    {r.suggested != null ? r.suggested : "–"}
                  </span>
                </span>
              </div>
            ))}
          </div>
          <div className="text-xs opacity-50">
            Aggiorna i punteggi a mano nella Rosa.
          </div>
        </div>
      )}
    </ModalShell>
  );
}

// ---------- post-match vote page (opened via ?vote=…, no app shell state) ----------

function VotePage({ encoded }) {
  const [voterId, setVoterId] = useState(null);
  const [deltas, setDeltas] = useState({});
  const [sent, setSent] = useState(false);
  const [copied, setCopied] = useState(false);

  let payload = null;
  try {
    payload = JSON.parse(fromB64Url(encoded));
  } catch (e) {}

  const shell = (children) => (
    <div
      className="min-h-screen w-full relative"
      style={{
        background: "linear-gradient(180deg, #0A1F12 0%, #05130B 100%)",
        color: "#F5F1E8",
      }}
    >
      <div className="pitch-lines" aria-hidden="true"></div>
      <div className="floodlight" aria-hidden="true"></div>
      <div className="noise" aria-hidden="true"></div>
      <div className="max-w-md mx-auto px-4 pb-16 pt-7 relative">
        <header className="mb-6">
          <div
            className="flex items-center gap-2 text-xs font-semibold tracking-[0.3em] mb-1.5"
            style={{ color: "#F2B705" }}
          >
            <span
              className="kicker-dot inline-block w-2 h-2 rounded-full"
              style={{ background: "#F2B705" }}
            ></span>
            CALCETTO
          </div>
          <h1
            className="font-display font-black uppercase leading-none"
            style={{ fontSize: "2.6rem", letterSpacing: "0.01em" }}
          >
            Vota
          </h1>
        </header>
        {children}
      </div>
    </div>
  );

  if (!payload || !payload.p || !payload.p.length) {
    return shell(
      <div className="text-sm opacity-60 py-10 text-center">
        Link non valido o incompleto.
      </div>
    );
  }

  if (!voterId) {
    return shell(
      <div>
        <div className="font-display text-sm font-bold uppercase tracking-widest mb-3 opacity-70">
          Chi sei?
        </div>
        <div className="grid grid-cols-2 gap-2">
          {payload.p.map((p) => (
            <button
              key={p.i}
              onClick={() => setVoterId(p.i)}
              className="pressable flex items-center justify-center px-3 rounded-xl text-sm font-semibold"
              style={{
                minHeight: "48px",
                background: "rgba(255,255,255,0.04)",
                border: "1px solid rgba(255,255,255,0.08)",
              }}
            >
              {p.n}
            </button>
          ))}
        </div>
      </div>
    );
  }

  const voter = payload.p.find((p) => p.i === voterId);
  const others = payload.p.filter((p) => p.i !== voterId);

  if (sent) {
    const code = buildVoteCode(payload.m, voterId, deltas, payload.p);
    const message =
      "Voto di " + (voter ? voter.n : "?") + " – Calcetto\n" + code;

    async function copyCode() {
      try {
        await navigator.clipboard.writeText(message);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      } catch (e) {}
    }

    return shell(
      <div className="text-center py-6">
        <div className="text-lg font-bold mb-2">Grazie, {voter.n} ✓</div>
        <div className="text-xs opacity-60 mb-4">
          Se la condivisione non è partita da sola, copia e manda tu il
          messaggio a chi ha organizzato.
        </div>
        <button
          onClick={copyCode}
          className="pressable font-display w-full py-2.5 rounded-lg font-bold uppercase tracking-wider text-sm"
          style={{
            background: "rgba(255,255,255,0.08)",
            color: "#F5F1E8",
            border: "1px solid rgba(255,255,255,0.1)",
          }}
        >
          {copied ? "Copiato ✓" : "Copia messaggio"}
        </button>
      </div>
    );
  }

  function setDelta(id, d) {
    setDeltas((prev) => ({ ...prev, [id]: d }));
  }

  async function submit() {
    const code = buildVoteCode(payload.m, voterId, deltas, payload.p);
    const message =
      "Voto di " + (voter ? voter.n : "?") + " – Calcetto\n" + code;
    try {
      if (navigator.share) {
        await navigator.share({ text: message });
        setSent(true);
        return;
      }
    } catch (e) {
      if (e.name === "AbortError") return;
    }
    try {
      window.open(
        "https://wa.me/?text=" + encodeURIComponent(message),
        "_blank"
      );
    } catch (e) {}
    setSent(true);
  }

  const OPTIONS = [
    { d: -2, label: "−1" },
    { d: -1, label: "−0,5" },
    { d: 0, label: "=" },
    { d: 1, label: "+0,5" },
    { d: 2, label: "+1" },
  ];

  return shell(
    <div>
      <div className="font-display text-sm font-bold uppercase tracking-widest mb-3 opacity-70">
        Come hanno giocato i compagni? ({voter.n})
      </div>
      <div className="space-y-2 mb-4">
        {others.map((p) => {
          const current = deltas[p.i] || 0;
          return (
            <div
              key={p.i}
              className="px-3 py-2.5 rounded-xl"
              style={{
                background: "rgba(255,255,255,0.05)",
                border: "1px solid rgba(255,255,255,0.08)",
              }}
            >
              <div className="text-sm font-semibold mb-2">{p.n}</div>
              <div className="flex gap-1">
                {OPTIONS.map((o) => (
                  <button
                    key={o.d}
                    onClick={() => setDelta(p.i, o.d)}
                    className="pressable font-display flex-1 rounded-lg text-xs font-bold"
                    style={{
                      minHeight: "36px",
                      background:
                        current === o.d ? "#1B4332" : "rgba(255,255,255,0.06)",
                      color: current === o.d ? "#F5F1E8" : "rgba(245,241,232,0.6)",
                      border:
                        current === o.d
                          ? "1px solid #F2B705"
                          : "1px solid rgba(255,255,255,0.08)",
                    }}
                  >
                    {o.label}
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <button
        onClick={submit}
        className="pressable font-display w-full py-4 rounded-xl font-black uppercase tracking-wider text-lg"
        style={{
          background: "#F2B705",
          color: "#0A1F12",
          boxShadow: "0 4px 24px rgba(242,183,5,0.35)",
        }}
      >
        Invia voto

  );
}

function Root() {
  const voteParam = new URLSearchParams(location.search).get("vote");
